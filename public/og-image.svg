<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#1A1A2E"/>
  <!-- Subtle radial glow -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#FF6B35" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FF6B35" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Coral border ring -->
  <rect x="20" y="20" width="1160" height="590" rx="32" ry="32" fill="none" stroke="#FF6B35" stroke-width="4" opacity="0.4"/>

  <!-- Shopping bag icon (left) -->
  <g transform="translate(160, 175)">
    <path d="M50 90 L20 280 L260 280 L230 90 Z" fill="#FF6B35" opacity="0.18"/>
    <path d="M50 90 L20 280 L260 280 L230 90 Z" fill="none" stroke="#FF6B35" stroke-width="8" stroke-linejoin="round"/>
    <path d="M85 90 C85 45 110 18 140 18 C170 18 195 45 195 90" fill="none" stroke="#FF6B35" stroke-width="8" stroke-linecap="round"/>
    <text x="140" y="220" font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="92" fill="#FF6B35" text-anchor="middle" letter-spacing="-2">LL</text>
  </g>

  <!-- Wordmark + tagline (right) -->
  <text x="500" y="290" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="108" fill="#FFFFFF" letter-spacing="-3">Lleva Lleva</text>
  <text x="500" y="360" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="600" font-size="42" fill="#FF6B35" letter-spacing="-1">Clasificados Colombia</text>
  <text x="500" y="430" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="30" fill="#CCCCCC">Compra, vende y conecta</text>
  <text x="500" y="470" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="30" fill="#CCCCCC">con personas de tu región</text>

  <!-- URL footer -->
  <text x="600" y="570" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="500" font-size="24" fill="#888888" text-anchor="middle">lleva-lleva.com</text>
</svg>
